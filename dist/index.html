t Spring!",icon:"💧",description:`Deep within ${d}, you hear the melodic sound of flowing water that seems to sing with Qi. Parting a curtain of luminous vines, you discover a small spring glowing with an ethereal blue light. The water itself is liquid spiritual energy — pure, ancient, and incredibly rare. The air around it makes your dantian resonate.`,choices:[{id:"bathe",label:"Bathe in the spring",icon:"🛁",description:"Absorb the spiritual water directly.",karmaHint:"neutral"},{id:"meditate",label:"Meditate beside it",icon:"🧘",description:"Let the ambient Qi refine your foundation.",karmaHint:"righteous"},{id:"drink",label:"Drink deeply",icon:"🥤",description:"Consume the essence directly.",karmaHint:"neutral"}],resolve:c=>c==="bathe"?{text:"The water enfolds you like liquid starlight. Every pore of your body opens, drinking in spiritual energy. Your meridians widen, your dantian expands. When you emerge, your skin glows faintly, and your Qi circulation is permanently enhanced.",statChanges:{qi:S(15,30),strength:S(3,7)},hpChange:S(20,40),alignmentChange:0,herbsChange:0,oresChange:0,spChange:S(5,10)}:c==="meditate"?{text:"You sit in lotus position beside the spring. The ambient Qi is so dense it's almost visible — threads of blue and gold light weaving through the air. Hours pass like heartbeats. When you open your eyes, your understanding of Qi has deepened fundamentally.",statChanges:{qi:S(20,35),wisdom:S(5,12),intelligence:S(3,7)},hpChange:S(15,30),alignmentChange:3,herbsChange:0,oresChange:0,spChange:S(8,15)}:{text:"The water tastes like crystallized moonlight. Raw power surges through your body, almost too much to contain. Your cultivation base swells dramatically — but the intensity leaves you slightly dazed.",statChanges:{qi:S(25,45)},hpChange:-S(5,15),alignmentChange:0,herbsChange:0,oresChange:0,spChange:S(3,8)}},{id:"mysterious_elder",category:"fortunate",title:"Mysterious Elder",icon:"👴",description:'Beneath an ancient tree whose roots seem to grip the ve
